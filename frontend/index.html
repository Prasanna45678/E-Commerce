<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ShopNova — Discover premium electronics, clothing, and home products at unbeatable prices." />
  <title>ShopNova — Premium Online Store</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <a href="/" class="nav-logo">⚡ ShopNova</a>

      <div class="nav-search">
        <span class="nav-search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Search products…" autocomplete="off" />
      </div>

      <div class="nav-links">
        <a href="/" class="nav-link active" id="nav-home">Home</a>
        <a href="/orders.html" class="nav-link" id="nav-orders" style="display:none">Orders</a>
        <a href="/auth.html" class="nav-link" id="nav-auth">Login</a>
        <span class="nav-link" id="nav-user" style="display:none; color:var(--accent); font-weight:600;"></span>
        <button class="nav-link" id="nav-logout" style="display:none; background:rgba(239,68,68,0.1); color:var(--danger); border:1px solid rgba(239,68,68,0.3); border-radius:8px; padding:0.4rem 0.8rem; font-size:0.85rem; cursor:pointer;">Logout</button>
        <a href="/cart.html" class="nav-cart-btn" id="nav-cart">
          🛒 Cart
          <span class="cart-badge" id="cart-badge" style="display:none">0</span>
        </a>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <div class="container">
      <div class="hero-badge">✨ New Arrivals Every Week</div>
      <h1>Shop the <span>Future</span><br>of Style & Tech</h1>
      <p>Discover curated premium products across electronics, fashion, and home essentials — all in one place.</p>
      <div class="hero-actions">
        <a href="#products" class="btn btn-primary btn-lg">Shop Now →</a>
        <a href="/auth.html" class="btn btn-secondary btn-lg" id="hero-auth-btn">Create Account</a>
      </div>
    </div>
  </section>

  <!-- Products Section -->
  <section class="section" id="products">
    <div class="container">
      <div class="flex-between" style="margin-bottom:1.5rem; flex-wrap:wrap; gap:1rem;">
        <h2 class="section-title" style="margin-bottom:0;">Our Collection</h2>
        <span id="product-count" style="color:var(--text-muted); font-size:0.85rem;"></span>
      </div>

      <!-- Category Tabs -->
      <div class="category-tabs" id="category-tabs">
        <button class="tab-btn active" data-cat="All">All Products</button>
        <button class="tab-btn" data-cat="Electronics">📱 Electronics</button>
        <button class="tab-btn" data-cat="Clothing">👗 Clothing</button>
        <button class="tab-btn" data-cat="Home">🏠 Home</button>
      </div>

      <!-- Product Grid -->
      <div class="products-grid" id="products-grid">
        <!-- Skeleton loaders -->
        <div class="skeleton" style="height:360px; border-radius:20px;"></div>
        <div class="skeleton" style="height:360px; border-radius:20px;"></div>
        <div class="skeleton" style="height:360px; border-radius:20px;"></div>
        <div class="skeleton" style="height:360px; border-radius:20px;"></div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>© 2024 <strong>ShopNova</strong> — Premium E-Commerce Platform</p>
    </div>
  </footer>

  <!-- Toast container -->
  <div id="toast-container" class="toast-container"></div>

  <script src="/js/api.js"></script>
  <script src="/js/products.js"></script>
</body>
</html>
