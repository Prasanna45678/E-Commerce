<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Login or Register — ShopNova" />
  <title>Login / Register — ShopNova</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <div class="logo-text">⚡ ShopNova</div>
        <p style="font-size:0.85rem; color:var(--text-muted); margin-top:0.3rem;">Your premium shopping destination</p>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab-btn active" id="tab-login" onclick="switchTab('login')">Login</button>
        <button class="auth-tab-btn" id="tab-register" onclick="switchTab('register')">Register</button>
      </div>

      <!-- Login Form -->
      <div class="auth-form active" id="form-login">
        <h2 style="font-size:1.3rem; margin-bottom:0.3rem;">Welcome back 👋</h2>
        <p style="font-size:0.85rem; margin-bottom:1.5rem;">Sign in to your account</p>

        <div class="form-group">
          <label for="login-email">Email Address</label>
          <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <div style="position:relative;">
            <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" style="padding-right:3rem;" />
            <button type="button" onclick="togglePass('login-password', this)"
              style="position:absolute; right:0.8rem; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:1rem;">👁</button>
          </div>
        </div>

        <div id="login-error" style="display:none; color:var(--danger); font-size:0.85rem; margin-bottom:1rem; padding:0.6rem 0.9rem; background:rgba(239,68,68,0.1); border-radius:var(--radius-sm); border:1px solid rgba(239,68,68,0.2);"></div>

        <button class="btn btn-primary btn-block btn-lg" id="login-btn" onclick="handleLogin()">
          Sign In
        </button>

        <div class="divider">or</div>

        <p style="text-align:center; font-size:0.875rem; color:var(--text-muted);">
          Don't have an account?
          <a href="#" onclick="switchTab('register')" style="color:var(--accent); font-weight:600;">Create one →</a>
        </p>
      </div>

      <!-- Register Form -->
      <div class="auth-form" id="form-register">
        <h2 style="font-size:1.3rem; margin-bottom:0.3rem;">Create Account 🚀</h2>
        <p style="font-size:0.85rem; margin-bottom:1.5rem;">Join ShopNova today</p>

        <div class="form-group">
          <label for="reg-name">Full Name</label>
          <input type="text" id="reg-name" placeholder="John Doe" autocomplete="name" />
        </div>
        <div class="form-group">
          <label for="reg-email">Email Address</label>
          <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="reg-password">Password</label>
          <div style="position:relative;">
            <input type="password" id="reg-password" placeholder="Min 6 characters" autocomplete="new-password" style="padding-right:3rem;" />
            <button type="button" onclick="togglePass('reg-password', this)"
              style="position:absolute; right:0.8rem; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:1rem;">👁</button>
          </div>
        </div>
        <div class="form-group">
          <label for="reg-confirm">Confirm Password</label>
          <input type="password" id="reg-confirm" placeholder="Re-enter password" autocomplete="new-password" />
        </div>

        <div id="reg-error" style="display:none; color:var(--danger); font-size:0.85rem; margin-bottom:1rem; padding:0.6rem 0.9rem; background:rgba(239,68,68,0.1); border-radius:var(--radius-sm); border:1px solid rgba(239,68,68,0.2);"></div>

        <button class="btn btn-primary btn-block btn-lg" id="reg-btn" onclick="handleRegister()">
          Create Account
        </button>

        <div class="divider">or</div>

        <p style="text-align:center; font-size:0.875rem; color:var(--text-muted);">
          Already have an account?
          <a href="#" onclick="switchTab('login')" style="color:var(--accent); font-weight:600;">Sign in →</a>
        </p>
      </div>

      <!-- Back to shop -->
      <div style="text-align:center; margin-top:1.5rem;">
        <a href="/" style="font-size:0.8rem; color:var(--text-muted);">← Back to Shop</a>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="/js/api.js"></script>
  <script>
    // Redirect if already logged in
    if (localStorage.getItem('token')) location.href = '/';

    function switchTab(tab) {
      document.querySelectorAll('.auth-tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      document.getElementById('form-' + tab).classList.add('active');
    }

    function togglePass(id, btn) {
      const input = document.getElementById(id);
      if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
      else { input.type = 'password'; btn.textContent = '👁'; }
    }

    function showError(elId, msg) {
      const el = document.getElementById(elId);
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideError(elId) {
      document.getElementById(elId).style.display = 'none';
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      if (document.getElementById('form-login').classList.contains('active')) handleLogin();
      else handleRegister();
    });

    async function handleLogin() {
      hideError('login-error');
      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const btn      = document.getElementById('login-btn');

      if (!email || !password) return showError('login-error', 'Please enter your email and password');

      btn.disabled = true;
      btn.textContent = '⏳ Signing in…';

      try {
        const data = await apiFetch('/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email, password })
        });
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        showToast(`Welcome back, ${data.user.name.split(' ')[0]}! 👋`, 'success');
        setTimeout(() => location.href = '/', 800);
      } catch (err) {
        showError('login-error', err.message);
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    async function handleRegister() {
      hideError('reg-error');
      const name     = document.getElementById('reg-name').value.trim();
      const email    = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const confirm  = document.getElementById('reg-confirm').value;
      const btn      = document.getElementById('reg-btn');

      if (!name || !email || !password || !confirm)
        return showError('reg-error', 'All fields are required');
      if (password.length < 6)
        return showError('reg-error', 'Password must be at least 6 characters');
      if (password !== confirm)
        return showError('reg-error', 'Passwords do not match');

      btn.disabled = true;
      btn.textContent = '⏳ Creating account…';

      try {
        const data = await apiFetch('/auth/register', {
          method: 'POST',
          body: JSON.stringify({ name, email, password })
        });
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        showToast(`Welcome to ShopNova, ${data.user.name.split(' ')[0]}! 🎉`, 'success');
        setTimeout(() => location.href = '/', 800);
      } catch (err) {
        showError('reg-error', err.message);
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }
  </script>
</body>
</html>
